<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HIGHTAC Helmets</title>
    <meta name="description" content="HIGHTAC helmet online order catalogue.">
    <link rel="stylesheet" href="./assets/css/styles.css?v=20260525-helmet-v1">
    <script src="./assets/js/access-guard.js?v=20260522-ipgate"></script>
  </head>
  <body data-page="home">
    <main class="page">
      <div class="notice" data-i18n="notice">Catalogue casque basé sur les données du fichier Excel ; le devis final fait foi.</div>
      <header class="topbar">
        <div class="topbar__left">
          <div class="brand" data-i18n="shop">BOUTIQUE HIGHTAC</div>
        </div>
        <div class="lang-switch" data-lang-switcher>
          <button class="lang-switch__button" type="button" data-lang="en">English</button>
          <button class="lang-switch__button" type="button" data-lang="fr">Français</button>
          <button class="lang-switch__button" type="button" data-lang="ar">العربية</button>
        </div>
        <div class="topbar__right">
          <a class="action-link" href="https://wa.me/8613602489689" data-i18n="whatsapp">WhatsApp</a>
        </div>
      </header>

      <section class="hero">
        <div>
          <h1 class="hero__title" data-i18n="home_title">Casques HIGHTAC</h1>
          <p class="hero__copy" data-hero-copy>Choisissez une catégorie de casque et ajoutez les modèles au panier.</p>
        </div>
        <div class="hero__preview" data-home-preview aria-hidden="true"></div>
      </section>

      <section class="category-grid" data-category-grid aria-live="polite"></section>
    </main>

    <script>
      (function () {
        var sources = [
          "./data/helmet-data.js?v=20260525-helmet-v1",
          "./assets/js/app.js?v=20260525-helmet-v1"
        ];
        function loadScript(src) {
          return new Promise(function (resolve, reject) {
            var script = document.createElement("script");
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.body.appendChild(script);
          });
        }
        if (window.HIGHTAC_ACCESS_GUARD && window.HIGHTAC_ACCESS_GUARD.loadScripts) {
          window.HIGHTAC_ACCESS_GUARD.loadScripts(sources);
        } else {
          sources.reduce(function (promise, src) {
            return promise.then(function () { return loadScript(src); });
          }, Promise.resolve());
        }
      })();
    </script>
  </body>
</html>
